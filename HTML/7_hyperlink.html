<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperlinks</title>
</head>
<style>
    body {
        text-align: center;
        font-size: 1.5em;
    }
</style>

<body>

    <a href="../index.html" title="Hmmm" target="_blank"> Go to the Main </a>

    <!--title for hovering text on link-->
    <!--target _blank opens a new tab-->
    <br>
    <a href="https://www.youtube.com/" target="_blank" rel="noopener"> Go to Youtube </a>

    <br>
    <div
        style="background-color: #f4f4f4; padding: 15px; border-radius: 5px; border: 2.5px solid #ccc; display: inline-block; text-align: left; margin-top: 20px; font-size: 0.8em;">
        <strong>Hyperlinks Code:</strong><br>
        <pre style="margin: 0; font-family: monospace;"><code>&lt;!-- Link to local file --&gt;
&lt;a href="../index.html" title="Tooltip"&gt;Home&lt;/a&gt;

&lt;!-- Link to external site in new tab --&gt;
&lt;a href="https://youtube.com" target="_blank"&gt;YouTube&lt;/a&gt;</code></pre>
    </div>
</body>

</html>
