<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tags</title>
</head>
<style>
    body {
        text-align: center;
        font-size: 1.5em;
    }
</style>

<body>
    <a rel="noopener" href="https://www.facebook.com/newtie.tommy" target="_blank" title="Fernado this is">
        <img src="../SOURCES/Gen.jpg" height="300" width="400" alt="This is fernando">
    </a>
    <!--alt shows text if image doesn't-->
    <br>

    <div
        style="background-color: #f4f4f4; padding: 15px; border-radius: 5px; border: 2.5px solid #ccc; display: inline-block; text-align: left; margin-top: 20px; font-size: 0.8em;">
        <strong>Image Tag Code:</strong><br>
        <pre style="margin: 0; font-family: monospace;"><code>&lt;!-- Image wrapped in a link --&gt;
&lt;a href="https://website.com" target="_blank"&gt;
    &lt;img src="../SOURCES/Gen.jpg" alt="Description" height="300" width="400"&gt;
&lt;/a&gt;</code></pre>
    </div>
</body>

</html>
