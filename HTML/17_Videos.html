<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Element</title>
</head>
<style>
    body {
        text-align: center;
        font-size: 1.5em;
    }
</style>

<body>

    <video controls autoplay muted>
        <source src="SOURCES/!ugly.mp4" type="video/mp4">

    </video>
    <!--controls adds play button-->
    <br>

    <div
        style="background-color: #f4f4f4; padding: 15px; border-radius: 5px; border: 2.5px solid #ccc; display: inline-block; text-align: left; margin-top: 20px; font-size: 0.8em;">
        <strong>Video Element Code:</strong><br>
        <pre style="margin: 0; font-family: monospace;"><code>&lt;video controls autoplay muted&gt;
    &lt;source src="SOURCES/!ugly.mp4" type="video/mp4"&gt;
&lt;/video&gt;</code></pre>
    </div>
</body>

</html>
