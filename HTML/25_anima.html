<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
</head>
<style>
    #box{
        height: 250px;
        width: 250px;
        font-size: 13em;
        text-align: center;
        background-color: violet;
        animation-name: slideUpfrom;
        animation-duration: 2s;
        animation-iteration-count: infinite;
        animation-direction: alternate;
        animation-play-state: running;
        animation-timing-function: ease-in-out;
    }
    @keyframes slideLeftfrom{
        from{transform: translateX(1000px);}
    }
    @keyframes slideRightto{
        to{transform: translateX(1000px);}/* wont stay at the position*/
    }
   @keyframes slideUpfrom{
        from{transform: translateY(500px);}
    }
     @keyframes rotate{
        50%{transform: rotate(360deg);}
    }
</style>
<style>
    body {
        text-align: center;
        font-size: 1.5em;
    }
</style>
<body>
    <div id="box">
        Hi
    </div>

    <div style="background-color: #f4f4f4; padding: 15px; border-radius: 5px; border: 2.5px solid #ccc; display: inline-block; text-align: left; margin-top: 20px; font-size: 0.8em;">
        <strong>CSS Animations Code:</strong><br>
        <pre style="margin: 0; font-family: monospace;"><code>#box {
    animation-name: slideUpfrom;
    animation-duration: 2s;
    animation-iteration-count: infinite;
}

@keyframes slideUpfrom {
    from { transform: translateY(500px); }
    to { transform: translateY(0px); }
}</code></pre>
    </div>
</body>
</html>
