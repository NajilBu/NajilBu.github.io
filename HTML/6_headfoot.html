<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header and Footer Elements</title>
</head>
<style>
    body {
        text-align: center;
        font-size: 1.5em;
    }
</style>
<body>
    <header>
        <h1>HELLLo</h1>
        <hr>
    </header>

    <div style="background-color: #f4f4f4; padding: 15px; border-radius: 5px; border: 2.5px solid #ccc; display: inline-block; text-align: left; margin-top: 20px; font-size: 0.8em;">
        <strong>Header/Footer Elements:</strong><br>
        <pre style="margin: 0; font-family: monospace;"><code>&lt;header&gt;
    &lt;h1&gt;Logo / Title&lt;/h1&gt;
    &lt;hr&gt;
&lt;/header&gt;
&lt;!-- You can also use &lt;footer&gt; for the bottom --&gt;</code></pre>
    </div>
</body>
</html>
