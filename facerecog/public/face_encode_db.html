<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Encoding with Webcam</title>
    <script defer src="./face-api.min.js"></script>
    <script defer src="./face_encode_db.js"></script>
</head>
<style>
    body{
    text-align:center;
    background:#111;
    color:white;
    font-family:Arial;
}
    #containerP{
        display: flex;
        justify-content: center;
        gap:20px;
        flex-wrap:wrap;
        position: relative;
    }
    canvas{
        position: absolute;
    }
    video{
        border:2px solid white;
        border-radius:10px; 
        
    }
    #username, #regis{
        margin-top: 20px;
        padding: 10px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
    }
    #regis:hover{
        background-color: #007bff;
        color: white;
        cursor: pointer;
    }
 </style>
<body>
      <h2>JS Face Encoding</h2>
    <div>
                <h3>JS Camera</h3>
    </div>
    <div id="containerP">
         
        <video id="video" width="720" height="560" autoplay muted></video>  
        <canvas id="canvas"></canvas>   
    
    </div>
    <div>
        <input type="text" id="username" placeholder="Enter full name">
        <button id="regis" onclick="startCapture()">Start Registration</button>
      

    </div>
    <p id="instruction">Status</p>
</body>
</html>
