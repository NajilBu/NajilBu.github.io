<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Checklist</title>
    <style>
        body{
            font-family:Arial;
            background:#f4f6f9;
            padding:20px
        }
        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:8px;
            
        }
        table{
            width:100%;
            border-collapse:collapse
        }
        th,td{
            padding:12px;
            border-bottom:1px solid #ccc
        }
        th{
            background:#eee
        }
        button{

            padding:8px 14px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            display: flex;
         
                
        }
        .in{
            background:#2ecc71;
            color:white
        }
        .out{
            background:#e74c3c;
            color:white
        }
    </style>
</head>

<body>

<div class="container">

<h2 align="center">Student Time In / Out Checklist</h2>

<center><button id="toggleBtn"></button></center><br>

<center>Schedule: <input type="datetime-local" id="schedule"></center><br>

<table>
<thead>
<tr><th>#</th><th>Name</th><th>Status</th><th>Action</th></tr>
</thead>
<tbody id="studentTable"></tbody>
</table>

<br><br>

<h3 align="center">Attendance Log Records</h3>
<table>
<thead>
<tr>
<th>ID</th><th>Name</th><th>Lab</th><th>Schedule</th><th>Time In</th><th>Time Out</th>
</tr>
</thead>
<tbody id="logTable"></tbody>
</table>

</div>

<script>
let mode='IN';

async function loadMode(){
    const res = await fetch('api.php?action=get_mode');
    const data = await res.json();
    mode = data.mode;
    updateToggle();
}

function updateToggle(){
    const btn = document.getElementById('toggleBtn');
    btn.textContent = 'SYSTEM MODE: ' + (mode === 'IN' ? 'TIME IN' : 'TIME OUT');
    btn.className = mode==='IN'?'in':'out';
}

async function toggleMode(){
    const res = await fetch('api.php?action=toggle_mode');
    const data = await res.json();
    mode = data.mode;
    updateToggle();
    loadStudents();
}

async function loadStudents(){
    const scheduleInput = document.getElementById('schedule').value;
    const schedule = scheduleInput ? scheduleInput.split('T')[0] : '';
    const res = await fetch(`api.php?action=get_students&date=${schedule}`);
    const data = await res.json();

    let html='';
    data.forEach(s=>{
        let statusClass='';
        if(s.status==='Present') statusClass='status-present';
        else if(s.status==='Going home') statusClass='status-going';
        else if(s.status==='Late') statusClass='status-late';

        html+=`
        <tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td class="${statusClass}">${s.status}</td>
            <td>
                <button class="${mode==='IN'?'in':'out'}" onclick="process(${s.id})">
                    ${mode==='IN'?'TIME IN':'TIME OUT'}
                </button>
            </td>
        </tr>`;
    });

    document.getElementById('studentTable').innerHTML = html;
}

async function process(id){
    const scheduleInput = document.getElementById('schedule').value;
    if(!scheduleInput){
        alert("Please select schedule date & time first");
        return;
    }

    const res = await fetch('api.php?action=process',{
        method:'POST',
        body:new URLSearchParams({student_id:id, schedule:scheduleInput})
    });
    const data = await res.json();
    if(data.status!=='ok'){
        alert(data.message || 'Error processing request');
        return;
    }

    loadStudents();
    loadLogs();
}

async function loadLogs(){
    const res = await fetch('api.php?action=get_logs');
    const data = await res.json();

    let html='';
    data.forEach(l=>{
        html+=`
        <tr>
            <td>${l.id_log}</td>
            <td>${l.name}</td>
            <td>${l.lab ?? ''}</td>
            <td>${l.schedule ?? ''}</td>
            <td>${l.time_In ?? ''}</td>
            <td>${l.time_Out ?? ''}</td>
        </tr>`;
    });

    document.getElementById('logTable').innerHTML = html;
}

document.getElementById('toggleBtn').onclick = toggleMode;

loadMode();
loadStudents();
loadLogs();

// Refresh every 3 seconds
setInterval(()=>{
    loadStudents();
    loadLogs();
},3000);
</script>

</body>
</html>
