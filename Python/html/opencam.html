<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title> Camera Streams</title>

<style>
body{
    text-align:center;
    background:#111;
    color:white;
    font-family:Arial;
}

.wrapper{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

video,img{
    width:680px;
    height:560px;
    border:2px solid white;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>JS Webcam + Python OpenCV Webcam</h2>

<div class="wrapper">
    <!-- JS webcam -->
    <div>
        <h3>JS Camera</h3>
        <video id="jsCam" autoplay playsinline></video>
    </div>

   
</div>

<script>
navigator.mediaDevices.getUserMedia({video:true})
    .then(stream => document.getElementById("jsCam").srcObject = stream)
    .catch(err => alert("JS Camera Error: " + err));
</script>

</body>
</html>
