<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Populate div</title>

    <style>
        *{
            box-sizing: border-box;
        }
        body{
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
   
        .view{
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-evenly;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }
        .box{
            width: 100px;
            height: 100px;
            border-radius: 6px;
            border: 2px solid gray;

            animation: enter 0.5s ease-out;
        }
        button{
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
        }

        @keyframes enter{
            from{
                opacity: 0;
                transform: scale(0) translateY(100%);
            }
            to{
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

<body>

    <button onclick="populate()">Populate</button>

    <div class="view" id="view"></div>

    <script>

        function randomColor(){
           return `rgb(
            ${Math.floor(Math.random()*256)},
            ${Math.floor(Math.random()*256)},
            ${Math.floor(Math.random()*256)})`;
        }

        function Square_rectangle(){
            return Math.random() < 0.5 ? "100px" : "150px";
        }

        function populate(){
            const div = document.createElement("div");
            div.className = "box";
            div.style.width = Square_rectangle();
            div.style.backgroundColor = randomColor();

            document.getElementById("view").appendChild(div);
        }

    </script>

</body>
</html>
