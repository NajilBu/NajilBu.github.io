<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic Expressions</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        font-size: 1.5em;
    }
</style>

<body>


    <h3 id="p1"></h3>
    <h3 id="p2"></h3>
    <h3 id="p3"></h3>
    <h3 id="p4"></h3>
    <h3 id="p5"></h3>

    <div
        style="background-color: #f4f4f4; padding: 15px; border-radius: 5px; border: 2.5px solid #ccc; display: inline-block; text-align: left; margin-top: 20px; font-size: 0.8em;">
        <strong>Arithmetic Operators:</strong><br>
        <pre style="margin: 0; font-family: monospace;"><code>worker = 32;
worker = worker * 2; // multiply
boss = boss ** 4; // exponent
boss++; // increment: worker--; // decrement</code></pre>
    </div>

    <script>

        let worker = 32;

        console.log(worker);
        document.getElementById("p1").textContent = `worker = ${worker}`

        worker = worker * 2;
        console.log(worker);
        document.getElementById("p2").textContent = `worker = ${worker}`


        let boss = 4;
        boss = boss ** 4; // exponents
        console.log(boss);
        document.getElementById("p3").textContent = `boss = ${boss}`

        // operands = values,variables
        // operators = + - / *

        boss++;//increment
        worker--;//decrement

        document.getElementById("p4").textContent = `boss = ${boss}, worker = ${worker}`
    </script>
</body>

</html>
